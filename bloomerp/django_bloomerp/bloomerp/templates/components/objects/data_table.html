{% load bloomerp %}


<div 
    id="data-table-container"
    data-content-type-id="{{ content_type_id }}"
    >
    <!--Search inputs-->
    <div class="mb-2 justify-between flex items-center">
        <div class="flex space-x-2">
            <input
                type="text"
                name="q"
                placeholder="Search..."
                class="input input-bordered"
                hx-get="{% url 'components_data_table_2' content_type_id=content_type_id %}"
                hx-trigger="keyup changed delay:500ms"
                hx-target="#data-table-container"
                hx-swap="outerHTML"

            />
        </div>

        <div class="flex gap-2 items-center">
            <c-icons.filter size="24"/>

        </div>
    </div>

    <div class="overflow-auto rounded-lg border-l border-r border-gray-200">
        <table id="data-table-{{ content_type_id }}" class="table-auto table-hover table w-full border-collapse outline-none" data-datatable>
            <thead>
                <tr >
                    {% for field in fields %}
                    <th >{{ field.field }}</th>
                    {% endfor %}
                    <th >Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for object in queryset %}
                <tr
                    hx-get="{{ object.get_absolute_url }}"
                    hx-target="#main-content"
                    hx-swap="innerHTML"
                    hx-trigger="click"
                    hx-push-url="true"
                >
                    {% for field in fields %}
                        {% render_data_table_value object field request.user %}
                    {% endfor %}
                    <td >
                        <button class="btn btn-sm btn-secondary">Edit</button>
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Context Menu Dropdown -->
    <div id="data-table-{{ content_type_id }}-context-menu" class="hidden fixed bg-white shadow-lg rounded-lg border border-gray-200 z-50 min-w-[160px]">
        <ul class="py-1">
            <li>
                <button id="data-table-{{ content_type_id }}-context-menu-copy-value" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                    <i class="bi bi-clipboard"></i> Copy Cell
                </button>
            </li>
            <li id="data-table-{{ content_type_id }}-context-menu-filter-value-list-item">
                <button id="data-table-{{ content_type_id }}-context-menu-filter-value" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                    <i class="bi bi-filter"></i> Filter by Value
                </button>
            </li>
            <li>
                <button id="data-table-{{ content_type_id }}-context-menu-edit-value" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                    <i class="bi bi-pencil"></i> Edit Cell
                </button>
            </li>
            <li class="border-t border-gray-200">
                <button id="data-table-{{ content_type_id }}-context-menu-delete-row" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm text-red-600">
                    <i class="bi bi-trash"></i> Delete Row
                </button>
            </li>
        </ul>
    </div>
</div>
