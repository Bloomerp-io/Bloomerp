<form method="post" action="">
    {% csrf_token %}
    {% if builder_form.non_field_errors %}
        <div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            {{ builder_form.non_field_errors }}
        </div>
    {% endif %}
    <c-template_builder 
        id="document-template-builder" 
        document_template_id="{{ builder_form.instance.pk }}"
        content_type_id="{{ content_type_id }}" 
        name="{{ document_template_name|default:'Untitled template' }}"
        content="{{ template_content|default:'' }}"
        free_variables_json="{{ free_variables_json|default:'[]' }}"
        :content_types="content_types"
        page_size="{{ page_size }}"
        page_orientation="{{ page_orientation }}"
        page_margin="{{ page_margin }}"
        :include_page_numbers="include_page_numbers"
        :template_builder_variable_catalog="template_builder_variable_catalog"
        />
</form>
