<div class="mx-auto flex max-w-xl flex-col items-center justify-center gap-4 rounded-xl border border-gray-200 bg-white px-8 py-12 text-center shadow-sm">
    <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-red-600">
        <i class="fa-solid fa-user-shield text-2xl"></i>
    </div>
    <div class="space-y-2">
        <h1 class="text-xl font-semibold text-gray-900">{{ title|default:"Access denied" }}</h1>
        <p class="text-sm leading-6 text-gray-600">
            {{ message|default:"You don't have permission to access this page." }}
        </p>
    </div>
    {% if is_authenticated %}
        <a
            href="{{ logout_url|default:'/logout/' }}"
            class="inline-flex items-center justify-center rounded-lg bg-gray-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-800"
        >
            Sign out
        </a>
    {% else %}
        <a
            href="{{ login_url|default:'/login/' }}"
            class="inline-flex items-center justify-center rounded-lg bg-gray-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-800"
        >
            Go to login
        </a>
    {% endif %}
</div>
