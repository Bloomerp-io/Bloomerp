<!--
Snippet for a modal window that is used to create a query to an llm.

Variables:
    - id: The id of the modal window.
    - title: The title of the modal window.
    - query_type: The type of the query to be executed.
    - args : The arguments to be passed to the llm executor. (args have the form argName=argValue;argName=argValue;...)
-->
{% load static %}
{% load bloomerp %}
{% load cotton %}

<c-ui.modal id="modal_{{ id }}" title="{{ title }}" size="lg" backdrop_click_close=False>
    <div class="container">
        <!--Controls-->
        <div class="flex gap-2 justify-start mb-4">
            <button
                class="px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-100 transition-colors"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#conversation_history_{{ id }}"
                hx-get="{% url 'components_ai_conversations' %}?conversation_type={{ query_type }}&target={{ id }}&args={{ args }}"
                hx-target="#conversation_history_{{ id }}"
                >
                <span>Chat history</span>
                <i class="bi bi-layout-sidebar-inset ml-1"></i>
            </button>
            <button
                class="px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-100 transition-colors"
                type="button"
                hx-get="{% url 'components_ai_conversations' %}?conversation_type={{ query_type }}&target={{ id }}&new_conversation=true&args={{ args }}"
                hx-target="#conversation_container_{{ id }}"
                >
                <span>New conversation</span>
                <i class="bi bi-plus ml-1"></i>
            </button>
        </div>
        <!--End Controls-->

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">
            
            <div class="md:col-span-4">
                 <!-- Conversation container -->
                <div 
                    id="conversation_container_{{ id }}"
                    hx-get="{% url 'components_ai_conversations' %}?latest=true&conversation_type={{ query_type }}&args={{ args }}&target={{ id }}"
                    hx-target="#conversation_container_{{ id }}"
                    hx-trigger="load"
                    class="min-h-96 max-h-96 overflow-y-auto border border-gray-200 rounded-lg p-4 mb-4"
                    >

                </div>
                <!-- End conversation container -->

                <!-- Query Input -->
                <div class="space-y-4">
                    <div class="relative">
                        <textarea 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-colors resize-none" 
                            id="llm_query_{{ id }}"
                            placeholder="Enter your query..."
                            rows="3"
                        ></textarea>
                    </div>
                    <!-- End query -->

                    <div class="flex justify-center">                    
                        <button 
                            onclick="sendAiMessage('{{ id }}', '{% url "components_llm_executor" %}')"
                            class="btn btn-primary"
                            type="button"
                            id="generate_button_{{ id }}"
                        >
                            Send message
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</c-ui.modal>

<div id="llm_output_{{ id }}" class="hidden"></div>

<script>
    document.getElementById('llm_query_{{ id }}').addEventListener('keypress', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            document.getElementById('generate_button_{{ id }}').click();
        }
    });

    // Update toggleFullScreenModal function for new modal structure
    function toggleFullScreenModal(containerId) {
        const container = document.getElementById(containerId);
        if (container) {
            container.classList.toggle('max-w-full');
            container.classList.toggle('w-full');
            container.classList.toggle('h-full');
            container.classList.toggle('rounded-none');
            container.classList.toggle('max-w-2xl');
        }
    }
</script>
</script>
