{% if avatar %}
    <img src="{{ avatar.url }}" class="{{ class_name }}" style="height:{{ size }}; width:{{ size }}" alt="avatar">
{% else %}
    <div class="{{ class_name }} h-8 w-8 bg-primary-100 rounded-full flex justify-center items-center p-2" style="height:{{ size }}; width:{{ size }}">
        <span class="text-md">{{ initials }}</span>
    </div>
{% endif %}
