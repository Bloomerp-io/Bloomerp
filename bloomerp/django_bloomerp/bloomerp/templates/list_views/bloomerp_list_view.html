{% load static %}
{% load bloomerp %}
{% load crispy_forms_tags %}

<!-- Page Title -->
{% breadcrumb title=title model=model %}

<div
	hx-get="{% url 'components_data_table_2' content_type_id=content_type_id %}"
	hx-trigger="load"
	hx-target="this"
	hx-swap="outerHTML"
>
</div>

<div class="flex justify-center gap-2 mt-3">
	<a class="btn btn-primary" href="{% url create_view_url %}">Add {{ model_name }}</a>
	<a class="btn btn-secondary" href="{% url bulk_upload_url %}">Bulk upload {{ model_name_plural }}</a>
</div>
