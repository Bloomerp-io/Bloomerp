<div class="rounded-xl bg-base px-4 py-4 sm:px-5">
    <textarea
        class="h-24 w-full resize-none border-0 bg-transparent p-0 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-0"
        placeholder="Add comment..."></textarea>

    <div class="mt-4 flex flex-col gap-4 border-t border-stone-200 pt-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex items-center gap-4 text-sm text-slate-500">
            <button type="button" class="font-semibold transition hover:text-slate-700">B</button>
            <button type="button" class="italic transition hover:text-slate-700">I</button>
            <button type="button" class="underline transition hover:text-slate-700">U</button>
            <button type="button" class="transition hover:text-slate-700">
                <i class="fa fa-paperclip"></i>
            </button>
            <button type="button" class="transition hover:text-slate-700">
                <i class="fa fa-image"></i>
            </button>
            <button type="button" class="transition hover:text-slate-700">
                <i class="fa fa-smile-o"></i>
            </button>
            <button type="button" class="transition hover:text-slate-700">
                <i class="fa fa-at"></i>
            </button>
        </div>

        <button
            class="btn btn-primary">
            Submit
        </button>
    </div>
</div>

<div class="my-8 h-px w-full bg-stone-200"></div>

<div class="mb-8 flex items-center justify-between gap-4">
    <div class="flex items-center gap-2.5">
        <h2 class="text-lg font-semibold text-slate-800">Comments</h2>
        <span
            class="badge badge-primary">25</span>
    </div>

    <button type="button"
        class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 transition hover:text-slate-700">
        <i class="fa fa-sort-amount-desc text-xs"></i>
        <span>Most recent</span>
        <i class="fa fa-angle-down text-xs"></i>
    </button>
</div>

<div class="space-y-8 flex flex-col">
    {{ slot }}        
</div>

<div class="pt-8 text-center">
    <button type="button"
        class="inline-flex items-center gap-2 text-sm font-semibold text-primary transition hover:text-primary-dark">
        <span>Show more</span>
        <i class="fa fa-angle-down"></i>
    </button>
</div>
