{% comment %}
message

A message to be shown

Parameters:
- text (str): the content
- type (str): the type of message (e.g., info, success, warning, error)
- duration (int): how long the message should be displayed in seconds

{% endcomment %}
<div 
    bloomerp-component="ui-message"
    data-message-text="{{ text }}"
    data-message-type="{{ type }}"
    data-duration="{{ duration }}"
    >
</div>
