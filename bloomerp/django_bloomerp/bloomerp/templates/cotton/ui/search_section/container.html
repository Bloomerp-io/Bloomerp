<div 
    bloomerp-component="search-section"
    >
    <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div class="flex min-w-0 flex-1 flex-col gap-2 sm:flex-row sm:items-center sm:gap-3">
            <div
                class="flex w-full items-center gap-3 rounded-xl border border-gray-200 bg-white px-2 py-1 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary sm:max-w-80 sm:flex-none">
                <span class="pointer-events-none shrink-0 text-gray-400">
                    <i class="fa fa-search"></i>
                </span>
                <input type="text" name="q" placeholder="Search..."
                    class="w-full border-0 bg-transparent p-0 text-sm text-gray-700 placeholder:text-gray-400 focus:outline-none focus:ring-0" />
            </div>
        </div>

        <div class="flex w-full flex-wrap gap-2 sm:w-auto sm:justify-end">
            {{ buttons }}
        </div>
    </div>

    <div>


        {{ slot }}
    </div>
</div>
