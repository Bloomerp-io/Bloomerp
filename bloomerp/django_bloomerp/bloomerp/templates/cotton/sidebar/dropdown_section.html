<!-- Reusable sidebar dropdown section component -->
{% load cotton %}

<div class="mb-6" x-data="{ {{ section_id }}Open: {{ default_open|default:'true' }} }">
    <button @click="{{ section_id }}Open = !{{ section_id }}Open"
        class="flex items-center justify-between w-full text-left text-sm font-semibold text-gray-700 hover:text-primary-800 transition-colors mb-3 hover:cursor-pointer">
        <span>{{ title }}</span>
        <svg class="w-4 h-4 transition-transform duration-200" :class="{ 'rotate-180': {{ section_id }}Open }"
            fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                clip-rule="evenodd"></path>
        </svg>
    </button>

    <div x-show="{{ section_id }}Open" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform scale-95"
         x-transition:enter-end="opacity-100 transform scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 transform scale-100"
         x-transition:leave-end="opacity-0 transform scale-95">
        
        {% if show_search %}
        <!-- Search input -->
        
        {% endif %}

        <!-- Content area -->
        <div class="space-y-1">
            {{ slot }}
        </div>
    </div>
</div>
