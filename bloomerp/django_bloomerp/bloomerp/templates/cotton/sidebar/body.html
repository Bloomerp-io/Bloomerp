{% load bloomerp %}
{% load cotton %}
{% load static %}

<div>
  <!-- Sidebar -->
  <!-- Default to hidden (translated off-screen) to prevent FOUC on mobile. 
       The Sidebar TS class will handle the state on load. -->
  <aside
    id="sidebar"
    class="fixed left-0 top-14 h-[calc(100vh-2rem)] w-64 transform -translate-x-full transition-transform duration-300 ease-in-out z-40 overflow-y-auto bg-base"
  >
    <nav class="px-4 py-6 pb-8">
        <!-- Personal workspaces section -->
        <c-sidebar.dropdown_section title="Personal workspaces" section_id="personal" show_search=False icon="bi bi-person-workspace">
            
        </c-sidebar.dropdown_section>
        <!--Personal workspaces section-->


        <!-- Model workspaces section -->
        <c-sidebar.dropdown_section title="Model Workspaces" section_id="model" show_search=True
            search_placeholder="Search" search_function="searchContentTypes()">
            
        </c-sidebar.dropdown_section>
        <!--End model workspaces section-->
    </nav>
  </aside>

  <!-- Mobile overlay -->
  <div
    id="sidebar-overlay"
    class="fixed inset-0 bg-gray-900/50 z-30 lg:hidden hidden"
  ></div>
</div>

<!-- Global toggle function for backward compatibility with buttons calling toggleSidebar() -->
<script>
    function toggleSidebar() {
        if (window.BloomerpApp && window.BloomerpApp.sidebar) {
            window.BloomerpApp.sidebar.toggle();
        }
    }
</script>
