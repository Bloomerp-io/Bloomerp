{% load static %}
{% load bloomerp %}

<header id="header" class="fixed top-0 w-full z-50 bg-base h-14">
    <div class="flex items-center justify-between px-3 h-full">
        <!-- Logo -->
        <div class="flex items-center justify-between lg:w-64 h-full">
            <a
                hx-get="{% url "bloomerp_home_view" %}"
                hx-target="#main-content"
                hx-swap="innerHTML"
                hx-push-url="true"
                class="flex items-center hover:cursor-pointer h-full overflow-hidden">
            <img src="{% static 'bloomerp/img/logo.png' %}" class="hidden md:block h-28">
            <img src="{% static 'bloomerp/img/logo-touch-icon.png' %}" class="md:hidden" width="30" height="30">
            </a>

            <button id="sidebar-toggle" type="button" class="hover:cursor-pointer">
                <c-icons.lines_horizontal size="24"/>
            </button>
            
        </div>
        <!-- End Logo -->

        <!-- Search bar using dropdown component -->
        <div bloomerp-component="global-search-modal" class="ml-3">
            <button id="global-search-btn" type="button" aria-haspopup="dialog" aria-controls="global-search-modal" 
                class="flex items-center gap-2 bg-white border border-gray-200 text-gray-700 px-3 py-1.5 rounded-md hover:cursor-pointer focus:outline-none">
                <i class="fa fa-magnifying-glass text-gray-500"></i>
                <span class="hidden sm:inline text-sm text-gray-600">Search</span>
                <span id="global-search-shortcut" class="ml-2 text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-md">⌘K</span>
            </button>

            <c-ui.modal id="global-search-modal" title="Search">
                <div>
                    <div class="relative mb-4">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 pointer-events-none">
                            <i class="fa fa-magnifying-glass"></i>
                        </span>
                        <input id="global-search-modal-input" autofocus placeholder="Search or type a command" 
                            class="w-full pl-10 pr-4 py-3 ring-0 focus:ring-0 border-0 focus:border-0" />

                        <hr class="text-gray-200">
                    </div>
                    <div id="global-search-results" class="divide-y divide-gray-200 max-h-96 overflow-y-auto rounded-b-lg bg-white">
                        <!-- Search results will be injected here -->
                    </div>
                </div>
            </c-ui.modal>
		</div>
        <!-- End Search bar -->
        
        <!-- Start Icons Navigation -->
        <nav class="ml-auto">
            <ul class="flex items-center space-x-4 mb-0">
                <!--Profile dropdown-->
                <li class="relative pr-3">
                    <c-ui.dropdown.body 
                        trigger_text="{% avatar object=request.user class_name='rounded-full w-8 h-8' size=32 %}<span class='hidden md:block ml-2 text-sm font-medium text-gray-700'>{{request.user.first_name}} {{request.user.last_name}}</span>"
                        position="right"
                        size="md"
                        :icon="False"
                    >
                        <div class="px-4 py-3 border-b border-gray-200">
                            <h6 class="text-sm font-semibold text-primary-800">{{request.user.username}}</h6>
                        </div>
                        
                        <c-ui.dropdown.item 
                            text="Account Settings" 
                            icon="bi bi-gear" 
                            hx_get="{% url 'users_my_profile_overview' %}"
                            hx_target="#main-content"
                            hx_swap="innerHTML"
                            hx_push_url="true"
                        />
                        
                        {% if request.user.is_staff %}
                        <c-ui.dropdown.item 
                            text="Admin page" 
                            icon="bi bi-hammer" 
                            href="/admin/"
                        />
                        {% endif %}
                        
                        <c-ui.dropdown.item 
                            text="Bookmarks" 
                            icon="bi bi-bookmark" 
                            hx_get="{% url 'bookmarks_user_bookmarks' %}"
                            hx_target="#main-content"
                            hx_swap="innerHTML"
                            hx_push_url="true"
                        />
                        
                        <c-ui.dropdown.item type="divider"/>
                        
                        <c-ui.dropdown.item 
                            text="Sign Out" 
                            icon="bi bi-box-arrow-right" 
                            danger=True
                            onclick="document.getElementById('logoutForm').submit()"
                        />
                        
                        <!-- Hidden logout form -->
                        <form id="logoutForm" action="{% url 'logout' %}" method="post" style="display: none;">
                            {% csrf_token %}
                        </form>
                    </c-ui.dropdown.body>
                </li>
                <!-- End Profile Dropdown Items -->
            </ul>
        </nav>
        <!-- End Icons Navigation -->
    </div>
</header>
