<div
    class="rounded-xl border border-gray-200 bg-white p-3 shadow-xs transition-colors hover:border-gray-300"
    draggable="{{ draggable }}"
    data-field-path="{{ field.path }}"
    x-data="{ expanded: false }"
    >
    <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2">
                {% if field.children %}
                <button
                    type="button"
                    class="flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-md text-gray-500 transition hover:bg-gray-100 hover:text-gray-700"
                    @click.stop="expanded = !expanded"
                    :aria-expanded="expanded.toString()"
                    aria-label="Toggle {{ field.label }} children"
                >
                    <i class="fa-solid fa-chevron-right text-xs transition-transform duration-200" :class="expanded ? 'rotate-90' : ''"></i>
                </button>
                {% else %}
                <span class="block h-6 w-6 flex-shrink-0"></span>
                {% endif %}
                <div class="truncate font-medium text-gray-900">{{ field.label }}</div>
            </div>
        </div>
        <div class="rounded-full bg-gray-100 px-2 py-0.5 text-xs font-medium text-gray-600">{{ field.value_type }}</div>
    </div>

    {% if field.children %}
    <div class="mt-3 border-l border-gray-200 pl-4" x-show="expanded" x-cloak x-transition>
        <div class="space-y-2">
            {% for child in field.children %}
                <c-automation.value_field
                    :field="child"
                    draggable="{{ draggable}}"/>
            {% endfor %}
        </div>
    </div>
    {% endif %}
</div>
