<div 
    bloomerp-component="workspace-container"
    data-cols="4"
    data-rows='[{"divider":false,"cols":4},{"divider":true,"cols":6},{"divider":false,"cols":4}]'
    data-tile-ids="1,2,3,4,5,6,7"
    class="space-y-3"
>
    <div class="flex items-center justify-end my-2 gap-4">
        <button class="btn btn-sm btn-secondary" id="edit-workspaces-btn">
            <i class="fa fa-pen-to-square"></i> Edit
        </button>
        <button class="btn btn-sm btn-secondary" id="edit-workspaces-btn">
            <i class="fa fa-filter"></i> Filter
        </button>
    </div>

    <div class="space-y-4" id="workspace-tiles-section"></div>

    <div class="absolute bottom-6 right-6 gap-4 flex">
        <button 
            class="btn btn-primary" 
            id="add-tile-btn"
            >
            <c-blocktrans>Create tile</c-blocktrans>
        </button>
        <button 
            class="btn btn-primary" 
            bloomerp-open-drawer="add-tile-drawer"
            >
            <c-blocktrans>Add tile</c-blocktrans>
        </button>
    </div>

    <c-ui.drawer 
        id="add-tile-drawer" 
        side="right" 
        backdrop="False"
        >
        <div class="p-4">
            <c-ui.text.subtitle class="">
                Add Tile
            </c-ui.text.subtitle>
        </div>
    </c-ui.drawer>
</div>
