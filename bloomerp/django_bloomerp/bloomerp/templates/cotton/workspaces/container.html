<div 
    bloomerp-component="workspace-container"
    data-layout='{{ layout_json|default:"{\"rows\":[{\"title\":null,\"columns\":4,\"items\":[]}]}" }}'
    data-workspace-id="{{ workspace_id|default:'' }}"
    data-layout-save-url="/components/workspaces/save_workspace_layout/"
    data-layout-available-items-url="/components/workspaces/available_workspace_tiles/"
    data-layout-render-item-url="{% url 'components_render_workspace_tile' %}"
    data-layout-kind="workspace"
    class="space-y-4"
>
    <div class="flex items-center justify-between mb-4 gap-4">
        <div>
            {{ slot }}
        </div>

        <div>
            {% if workspace.user == request.user %}
            <button class="btn btn-sm btn-secondary" type="button" data-layout-edit-toggle>
                <i class="fa fa-pen-to-square"></i> 
                <c-blocktrans>Edit</c-blocktrans>
            </button>
            <c-ui.dropdown.body
                trigger_text="Share"
                trigger_button_class="btn btn-sm btn-secondary"
                trigger_icon_class="fa fa-share-nodes"
                position="right"
            >
                <div
                    id="workspace-share-component-{{ workspace.id }}"
                    class="p-2"
                    hx-get="{% url 'components_workspaces_share_workspace' workspace_id=workspace.id %}"
                    hx-trigger="load"
                    hx-target="this"
                    hx-swap="innerHTML"
                >
                    <div class="px-3 py-2 text-sm text-slate-500">
                        <c-blocktrans>Loading sharing options...</c-blocktrans>
                    </div>
                </div>
            </c-ui.dropdown.body>
            
            <button class="btn btn-sm btn-secondary hidden" type="button" data-layout-open-sidebar bloomerp-open-drawer="workspace-layout-items-drawer">
                <div class="flex items-center gap-1">
                    <i class="fa fa-grip"></i> Add items
                </div>
                
            </button>
            {% endif %}
        </div>
    </div>

    <div class="space-y-4" data-layout-root></div>

    <div class="absolute bottom-6 right-6 gap-4 flex">
        <button 
            class="btn btn-primary" 
            type="button"
            data-layout-open-sidebar
            bloomerp-open-drawer="workspace-layout-items-drawer"
            >
            <c-blocktrans>Add tile</c-blocktrans>
        </button>
    </div>

    <c-ui.drawer 
        id="workspace-layout-items-drawer" 
        side="right" 
        backdrop="False"
        >
        <div class="p-4">
            <c-ui.text.subtitle class="">
                Workspace Items
            </c-ui.text.subtitle>
            <div class="mt-4" data-layout-available-items></div>
        </div>
    </c-ui.drawer>
</div>
