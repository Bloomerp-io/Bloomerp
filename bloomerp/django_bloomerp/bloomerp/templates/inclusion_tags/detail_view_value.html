<div 
    bloomerp-component="detail-view-value"
    class="detail-layout-item group relative flex flex-col gap-1"
    data-value="{{ value }}"
    data-label="{{ application_field.title }}"
    data-application-field-id="{{ application_field.id }}"
    data-layout-item-id="{{ application_field.id }}"
    data-colspan="{{ colspan|default:'1' }}"
    >
    <div class="detail-layout-item__header flex items-center justify-between gap-2">
        <c-ui.text.label class="mb-0" data-detail-label>
            {{ application_field.title }}
        </c-ui.text.label>

        <div data-layout-item-controls class="hidden items-center gap-1">
            <input
                data-layout-colspan-input
                type="number"
                min="1"
                value="{{ colspan|default:'1' }}"
                class="w-12 rounded-md border border-slate-200 px-1 py-0.5 text-center text-xs"
                title="Field width"
            />
            <button
                data-layout-remove-item
                type="button"
                class="h-6 w-6 rounded-full border border-rose-200 text-rose-500 transition hover:bg-rose-50"
                title="Remove field"
            >
                <i class="fa fa-xmark"></i>
            </button>
        </div>
    </div>

    <div class="detail-layout-item__body">
        {{ input }}
    </div>

    <button
        data-layout-colspan-resize-handle
        class="absolute right-0 top-1/2 hidden h-8 w-2 -translate-y-1/2 cursor-ew-resize rounded bg-slate-200/80 transition"
        title="Drag to resize width"
        aria-label="Drag to resize width"
        type="button"
    ></button>
</div>
