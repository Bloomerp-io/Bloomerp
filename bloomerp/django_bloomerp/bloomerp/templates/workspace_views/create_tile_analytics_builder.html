<div class="space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700" for="visualization_type">Visualization type</label>
        <select id="visualization_type" name="visualization_type" class="w-full rounded-lg border border-gray-300 px-3 py-2">
            <option value="table" {% if visualization_type == "table" %}selected{% endif %}>Table</option>
            <option value="kpi" {% if visualization_type == "kpi" %}selected{% endif %}>KPI</option>
            <option value="pie_chart" {% if visualization_type == "pie_chart" %}selected{% endif %}>Pie chart</option>
            <option value="two_dim_chart" {% if visualization_type == "two_dim_chart" %}selected{% endif %}>Two dimensional chart</option>
        </select>
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700" for="builder_config_json">Builder config (JSON)</label>
        <textarea
            id="builder_config_json"
            name="builder_config_json"
            rows="6"
            class="w-full rounded-lg border border-gray-300 px-3 py-2"
            placeholder="{}"
        >{{ builder_config_json }}</textarea>
    </div>
</div>
