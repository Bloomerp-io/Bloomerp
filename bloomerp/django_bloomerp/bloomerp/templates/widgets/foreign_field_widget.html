<div 
    bloomerp-component="foreign-field-widget" 
    data-is-m2m="{{ widget.is_m2m|yesno:'true,false' }}"
    data-content-type-id="{{ content_type_id }}"
    data-field-name="{{ widget.name }}"
    
    class="relative"
    >
    <input 
        type="text" 
        class="{{ widget.attrs.class }}"
    >
    <div class="foreign-field-selected mt-2" aria-live="polite"></div>

    <div class="foreign-field-dropdown hidden absolute left-0 right-0 top-full mt-1 z-50">
        <ul class="foreign-field-results bg-white border border-gray-200 max-h-52 overflow-auto rounded-t-md shadow-lg list-none m-0 p-0 text-sm"></ul>

        <div class="bg-white border border-t-0 border-gray-200 rounded-b-md shadow-lg">
            <div data-action="create-new" class="px-3 py-2 text-sm text-primary cursor-pointer hover:bg-gray-50">Create new</div>
            <div data-action="advanced-query" class="px-3 py-2 text-sm text-primary cursor-pointer hover:bg-gray-50 border-t border-gray-100">Advanced query</div>
        </div>
    </div>
</div>
