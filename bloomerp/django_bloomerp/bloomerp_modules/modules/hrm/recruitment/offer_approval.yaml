name: Offer Approval
id: offer_approval
description: Offer approval workflow
name_plural: Offer Approvals
string_representation: "{offer}"
fields:
  - id: offer
    name: Offer
    type: ForeignKey
    options:
      to: hrm.recruitment.offer
      on_delete: CASCADE
  - id: approver
    name: Approver
    type: UserField
    options:
      null: true
      blank: true
      on_delete: SET_NULL
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["pending", "Pending"]
        - ["approved", "Approved"]
        - ["rejected", "Rejected"]
      default: "pending"
  - id: decided_at
    name: Decided At
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  sections:
    - title: "Approval"
      columns: 2
      items:
        - offer
        - approver
        - status
        - decided_at
    - title: "Notes"
      columns: 1
      items:
        - notes
