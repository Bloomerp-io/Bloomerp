name: Offer
id: offer
description: Employment offer
name_plural: Offers
string_representation: "{application}"
fields:
  - id: application
    name: Application
    type: ForeignKey
    options:
      to: hrm.recruitment.application
      on_delete: CASCADE
  - id: offer_date
    name: Offer Date
    type: DateField
    options:
      null: true
      blank: true
  - id: proposed_start_date
    name: Proposed Start Date
    type: DateField
    options:
      null: true
      blank: true
  - id: salary
    name: Salary
    type: DecimalField
    options:
      max_digits: 12
      decimal_places: 2
      null: true
      blank: true
  - id: currency
    name: Currency
    type: CharField
    options:
      max_length: 10
      null: true
      blank: true
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["draft", "Draft"]
        - ["sent", "Sent"]
        - ["accepted", "Accepted"]
        - ["declined", "Declined"]
      default: "draft"
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  sections:
    - title: "Offer"
      columns: 2
      items:
        - application
        - status
        - offer_date
        - proposed_start_date
        - salary
        - currency
    - title: "Notes"
      columns: 1
      items:
        - notes
