name: Work Schedule
id: work_schedule
description: Standard work schedule
name_plural: Work Schedules
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: start_time
    name: Start Time
    type: TimeField
    options:
      null: true
      blank: true
  - id: end_time
    name: End Time
    type: TimeField
    options:
      null: true
      blank: true
  - id: work_days
    name: Work Days
    type: CharField
    options:
      max_length: 120
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  sections:
    - title: "Schedule"
      columns: 2
      items:
        - name
        - is_active
        - start_time
        - end_time
        - work_days
    - title: "Description"
      columns: 1
      items:
        - description
