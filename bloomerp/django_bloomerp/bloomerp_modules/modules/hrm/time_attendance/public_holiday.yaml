name: Public Holiday
id: public_holiday
description: Public holiday calendar
name_plural: Public Holidays
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: date
    name: Date
    type: DateField
  - id: location
    name: Office Location
    type: ForeignKey
    options:
      to: hrm.core_people.office_location
      null: true
      blank: true
      on_delete: SET_NULL
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  sections:
    - title: "Holiday"
      columns: 2
      items:
        - name
        - date
        - location
        - is_active
