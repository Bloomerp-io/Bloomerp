name: Time Entry
id: time_entry
description: Time entry for work performed
name_plural: Time Entries
string_representation: "{employee} - {work_date}"
fields:
  - id: employee
    name: Employee
    type: ForeignKey
    options:
      to: hrm.employees.employee
      on_delete: CASCADE
  - id: work_date
    name: Work Date
    type: DateField
  - id: hours
    name: Hours
    type: DecimalField
    options:
      max_digits: 5
      decimal_places: 2
      default: 0
  - id: work_type
    name: Work Type
    type: CharField
    options:
      max_length: 120
      null: true
      blank: true
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  rows:
    - title: "Entry"
      columns: 2
      items:
        - id: employee
        - id: work_date
        - id: hours
        - id: work_type
    - title: "Notes"
      columns: 1
      items:
        - id: notes
