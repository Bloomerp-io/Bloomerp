name: Exit Reason
id: exit_reason
description: Exit reasons catalog
name_plural: Exit Reasons
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 30
      null: true
      blank: true
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  rows:
    - title: "Reason"
      columns: 2
      items:
        - id: name
        - id: code
        - id: is_active
    - title: "Description"
      columns: 1
      items:
        - id: description
