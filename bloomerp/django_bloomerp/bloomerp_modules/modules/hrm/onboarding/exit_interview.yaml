name: Exit Interview
id: exit_interview
description: Exit interview record
name_plural: Exit Interviews
string_representation: "{offboarding_process}"
fields:
  - id: offboarding_process
    name: Offboarding Process
    type: ForeignKey
    options:
      to: hrm.onboarding.offboarding_process
      on_delete: CASCADE
  - id: interviewer
    name: Interviewer
    type: UserField
    options:
      null: true
      blank: true
      on_delete: SET_NULL
  - id: scheduled_at
    name: Scheduled At
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  rows:
    - title: "Interview"
      columns: 2
      items:
        - id: offboarding_process
        - id: interviewer
        - id: scheduled_at
    - title: "Notes"
      columns: 1
      items:
        - id: notes
