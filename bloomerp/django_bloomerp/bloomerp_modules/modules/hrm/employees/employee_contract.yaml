name: Employee Contract
id: employee_contract
description: Stores contract information for employees
name_plural: Employee Contracts
string_representation: "{employee} - {start_date}"
fields:
  - id: employee
    name: Employee
    description: Link to employee
    type: ForeignKey
    options:
      to: hrm.employees.employee
      on_delete: CASCADE
  - id: contract_type
    name: Contract Type
    type: ChoiceField
    options:
      choices:
        - ["permanent", "Permanent"]
        - ["fixed_term", "Fixed Term"]
        - ["contractor", "Contractor"]
        - ["intern", "Intern"]
      null: true
      blank: true
  - id: start_date
    name: Start Date
    description: Start date of the contract
    type: DateField
    options:
      null: true
      blank: true
  - id: end_date
    name: End Date
    description: End date of the contract
    type: DateField
    options:
      null: true
      blank: true
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["draft", "Draft"]
        - ["active", "Active"]
        - ["expired", "Expired"]
        - ["terminated", "Terminated"]
      default: "draft"
  - id: salary
    name: Salary
    type: DecimalField
    options:
      max_digits: 12
      decimal_places: 2
      null: true
      blank: true
  - id: currency
    name: Currency
    type: CharField
    options:
      max_length: 10
      null: true
      blank: true
  - id: signed_date
    name: Signed Date
    type: DateField
    options:
      null: true
      blank: true
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  rows:
    - title: "Contract Details"
      columns: 2
      items:
        - id: employee
        - id: contract_type
        - id: status
        - id: start_date
        - id: end_date
        - id: signed_date
    - title: "Compensation"
      columns: 2
      items:
        - id: salary
        - id: currency
    - title: "Notes"
      columns: 1
      items:
        - id: notes
