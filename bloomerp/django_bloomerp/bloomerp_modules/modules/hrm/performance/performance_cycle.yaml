name: Performance Cycle
id: performance_cycle
description: Performance review cycle
name_plural: Performance Cycles
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 150
  - id: start_date
    name: Start Date
    type: DateField
    options:
      null: true
      blank: true
  - id: end_date
    name: End Date
    type: DateField
    options:
      null: true
      blank: true
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["planned", "Planned"]
        - ["active", "Active"]
        - ["closed", "Closed"]
      default: "planned"
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  rows:
    - title: "Cycle"
      columns: 2
      items:
        - id: name
        - id: status
        - id: start_date
        - id: end_date
    - title: "Description"
      columns: 1
      items:
        - id: description
