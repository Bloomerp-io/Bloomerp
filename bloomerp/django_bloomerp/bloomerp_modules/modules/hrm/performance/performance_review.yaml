name: Performance Review
id: performance_review
description: Performance review record
name_plural: Performance Reviews
string_representation: "{employee} - {performance_cycle}"
fields:
  - id: employee
    name: Employee
    type: ForeignKey
    options:
      to: hrm.employees.employee
      on_delete: CASCADE
  - id: performance_cycle
    name: Performance Cycle
    type: ForeignKey
    options:
      to: hrm.performance.performance_cycle
      on_delete: CASCADE
  - id: reviewer
    name: Reviewer
    type: UserField
    options:
      null: true
      blank: true
      on_delete: SET_NULL
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["draft", "Draft"]
        - ["in_review", "In Review"]
        - ["completed", "Completed"]
      default: "draft"
  - id: overall_rating
    name: Overall Rating
    type: DecimalField
    options:
      max_digits: 4
      decimal_places: 2
      null: true
      blank: true
  - id: summary
    name: Summary
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  rows:
    - title: "Review"
      columns: 2
      items:
        - id: employee
        - id: performance_cycle
        - id: reviewer
        - id: status
        - id: overall_rating
    - title: "Summary"
      columns: 1
      items:
        - id: summary
