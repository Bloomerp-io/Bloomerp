name: HR Cost Center
id: hr_cost_center
description: Cost center used for HR allocations
name_plural: Cost Centers
string_representation: "{code} - {name}"
fields:
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 30
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  sections:
    - title: "Cost Center"
      columns: 2
      items:
        - code
        - name
        - is_active
    - title: "Description"
      columns: 1
      items:
        - description
