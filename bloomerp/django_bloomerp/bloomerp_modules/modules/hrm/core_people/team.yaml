name: Team
id: team
description: Team within a department
name_plural: Teams
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: department
    name: Department
    type: ForeignKey
    options:
      to: hrm.core_people.department
      on_delete: CASCADE
  - id: lead
    name: Team Lead
    type: ForeignKey
    options:
      to: hrm.employees.employee
      null: true
      blank: true
      on_delete: SET_NULL
      related_name: lead_teams
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  rows:
    - title: "Team Details"
      columns: 2
      items:
        - id: name
        - id: department
        - id: lead
        - id: is_active
    - title: "Description"
      columns: 1
      items:
        - id: description
