name: Department
id: department
description: Organizational department
name_plural: Departments
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 120
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 30
      null: true
      blank: true
  - id: parent_department
    name: Parent Department
    type: ForeignKey
    options:
      to: self
      null: true
      blank: true
      on_delete: SET_NULL
  - id: manager
    name: Manager
    type: ForeignKey
    options:
      to: hrm.employees.employee
      null: true
      blank: true
      on_delete: SET_NULL
      related_name: managed_departments
  - id: cost_center
    name: Cost Center
    type: ForeignKey
    options:
      to: hrm.core_people.hr_cost_center
      null: true
      blank: true
      on_delete: SET_NULL
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  rows:
    - title: "Department Details"
      columns: 2
      items:
        - id: name
        - id: code
        - id: parent_department
        - id: manager
        - id: cost_center
        - id: is_active
    - title: "Description"
      columns: 1
      items:
        - id: description
