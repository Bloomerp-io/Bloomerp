name: Office Location
id: office_location
description: Physical office location
name_plural: Office Locations
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 150
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 30
      null: true
      blank: true
  - id: address
    name: Address
    type: TextField
    options:
      null: true
      blank: true
  - id: city
    name: City
    type: CharField
    options:
      max_length: 80
      null: true
      blank: true
  - id: country
    name: Country
    type: CharField
    options:
      max_length: 80
      null: true
      blank: true
  - id: phone
    name: Phone
    type: CharField
    options:
      max_length: 30
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  sections:
    - title: "Location Details"
      columns: 2
      items:
        - name
        - code
        - city
        - country
        - phone
        - is_active
    - title: "Address"
      columns: 1
      items:
        - address
