name: Opportunity
id: opportunity
description: Sales opportunity for revenue pipeline
name_plural: Opportunities
string_representation: "{opportunity_name}"
fields:
  - id: opportunity_name
    name: Opportunity Name
    type: CharField
    options:
      max_length: 200
  - id: account
    name: Account
    type: ForeignKey
    options:
      to: crm.core.crm_account
      on_delete: CASCADE
  - id: contact
    name: Primary Contact
    type: ForeignKey
    options:
      to: crm.core.contact
      null: true
      blank: true
      on_delete: SET_NULL
  - id: lead
    name: Lead
    type: ForeignKey
    options:
      to: crm.sales.lead
      null: true
      blank: true
      on_delete: SET_NULL
  - id: stage
    name: Stage
    type: ForeignKey
    options:
      to: crm.sales.opportunity_stage
      on_delete: PROTECT
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["open", "Open"]
        - ["won", "Won"]
        - ["lost", "Lost"]
  - id: amount
    name: Amount
    type: DecimalField
    options:
      max_digits: 12
      decimal_places: 2
      default: 0
  - id: probability
    name: Probability (%)
    type: DecimalField
    options:
      max_digits: 5
      decimal_places: 2
      default: 0
  - id: expected_close_date
    name: Expected Close Date
    type: DateField
    options:
      null: true
      blank: true
  - id: close_date
    name: Close Date
    type: DateField
    options:
      null: true
      blank: true
  - id: source
    name: Source
    type: ChoiceField
    options:
      choices:
        - ["lead", "Lead"]
        - ["referral", "Referral"]
        - ["upsell", "Upsell"]
        - ["renewal", "Renewal"]
  - id: assigned_to
    name: Owner
    type: UserField
    options:
      null: true
      blank: true
      on_delete: SET_NULL
  - id: next_step
    name: Next Step
    type: CharField
    options:
      max_length: 200
      null: true
      blank: true
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
field_layout:
  sections:
    - title: "Opportunity Details"
      columns: 2
      items:
        - opportunity_name
        - status
        - account
        - stage
        - contact
        - lead
    - title: "Forecast"
      columns: 2
      items:
        - amount
        - probability
        - expected_close_date
        - close_date
    - title: "Ownership"
      columns: 2
      items:
        - source
        - assigned_to
        - next_step
    - title: "Notes"
      columns: 1
      items:
        - description
