name: CRM Account
id: crm_account
description: Company or organization record in CRM
name_plural: CRM Accounts
string_representation: "{account_name}"
fields:
  - id: account_name
    name: Account Name
    description: Legal or trading name of the account
    type: CharField
    options:
      max_length: 200
  - id: account_type
    name: Account Type
    description: Classification of the account relationship
    type: ChoiceField
    options:
      choices:
        - ["customer", "Customer"]
        - ["prospect", "Prospect"]
        - ["partner", "Partner"]
        - ["vendor", "Vendor"]
  - id: industry
    name: Industry
    description: Primary industry sector
    type: CharField
    options:
      max_length: 120
      null: true
      blank: true
  - id: website
    name: Website
    type: URLField
    options:
      null: true
      blank: true
  - id: primary_email
    name: Primary Email
    type: EmailField
    options:
      null: true
      blank: true
  - id: primary_phone
    name: Primary Phone
    type: CharField
    options:
      max_length: 30
      null: true
      blank: true
  - id: billing_address
    name: Billing Address
    type: TextField
    options:
      null: true
      blank: true
  - id: shipping_address
    name: Shipping Address
    type: TextField
    options:
      null: true
      blank: true
  - id: rating
    name: Rating
    type: ChoiceField
    options:
      choices:
        - ["hot", "Hot"]
        - ["warm", "Warm"]
        - ["cold", "Cold"]
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
field_layout:
  sections:
    - title: "Account Details"
      columns: 2
      items:
        - account_name
        - account_type
        - industry
        - rating
    - title: "Contact"
      columns: 2
      items:
        - primary_email
        - primary_phone
        - website
    - title: "Addresses"
      columns: 1
      items:
        - billing_address
        - shipping_address
