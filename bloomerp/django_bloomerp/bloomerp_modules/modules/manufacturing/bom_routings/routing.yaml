name: Routing
id: routing
description: Production routing
name_plural: Routings
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 100
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 20
      unique: true
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
