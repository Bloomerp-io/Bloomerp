name: Cost Rate
id: cost_rate
description: Rates used for costing
name_plural: Cost Rates
string_representation: "{rate_type} - {rate_per_hour}"
fields:
  - id: work_center
    name: Work Center
    type: foreign_key
    options:
      to: manufacturing.bom_routings.work_center
      null: true
      blank: true
      on_delete: SET_NULL
  - id: cost_center
    name: Cost Center
    type: foreign_key
    options:
      to: manufacturing.costing.cost_center
      null: true
      blank: true
      on_delete: SET_NULL
  - id: rate_type
    name: Rate Type
    type: choice
    options:
      choices:
        - ["labor", "Labor"]
        - ["machine", "Machine"]
        - ["overhead", "Overhead"]
  - id: effective_from
    name: Effective From
    type: date
  - id: effective_to
    name: Effective To
    type: date
    options:
      null: true
      blank: true
  - id: rate_per_hour
    name: Rate Per Hour
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
