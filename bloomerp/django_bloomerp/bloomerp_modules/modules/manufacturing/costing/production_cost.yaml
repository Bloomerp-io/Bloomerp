name: Production Cost
id: production_cost
description: Actual or standard cost per MO
name_plural: Production Costs
string_representation: "{manufacturing_order} - {total_cost}"
fields:
  - id: manufacturing_order
    name: Manufacturing Order
    type: OneToOneField
    options:
      to: manufacturing.shop_floor.manufacturing_order
      on_delete: CASCADE
  - id: material_cost
    name: Material Cost
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: labor_cost
    name: Labor Cost
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: overhead_cost
    name: Overhead Cost
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: total_cost
    name: Total Cost
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: cost_per_unit
    name: Cost Per Unit
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: valuation_method
    name: Valuation Method
    type: ChoiceField
    options:
      choices:
        - ["standard", "Standard"]
        - ["actual", "Actual"]
        - ["average", "Average"]
  - id: calculated_at
    name: Calculated At
    type: DateTimeField
