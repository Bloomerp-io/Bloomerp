name: Cost Center
id: cost_center
description: Where costs are accumulated
name_plural: Cost Centers
string_representation: "{name}"
fields:
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 20
      unique: true
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 100
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
