name: Warehouse
id: warehouse
description: Warehouse
name_plural: Warehouses
string_representation: "{name}"
fields:
  - id: code
    name: Code
    type: string
    options:
      max_length: 20
      unique: true
  - id: name
    name: Name
    type: string
    options:
      max_length: 100
  - id: address
    name: Address
    type: text
    options:
      null: true
      blank: true
  - id: is_default
    name: Is Default
    type: boolean
    options:
      default: false

field_layout:
  sections:
    - title: Details
      columns: 2
      items:
        - code
        - name
        - is_default

    - title: Contact details
      columns: 2
      items:
        - address
