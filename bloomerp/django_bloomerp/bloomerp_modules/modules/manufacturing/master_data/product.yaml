name: Product
id: product
description: Product record
name_plural: Products
string_representation: "{code} {name}"
fields:
  - id: code
    name: Code
    type: string
    options:
      max_length: 50
      unique: true
  - id: name
    name: Name
    description: Name of the product
    type: string
    options:
      max_length: 100
  - id: description
    name: Description
    type: text
    options:
      null: true
      blank: true
  - id: type
    name: Type
    type: choice
    options:
      choices:
        - ["manufactured", "Manufactured"]
        - ["purchased", "Purchased"]
        - ["service", "Service"]
  - id: uom
    name: Unit of Measure
    type: foreign_key
    options:
      to: manufacturing.master_data.unit_of_measure
      on_delete: PROTECT
  - id: default_warehouse
    name: Default Warehouse
    type: foreign_key
    options:
      to: manufacturing.master_data.warehouse
      null: true
      blank: true
      on_delete: SET_NULL
  - id: is_active
    name: Is Active
    type: boolean
    options:
      default: true
  - id: lead_time_days
    name: Lead Time (Days)
    type: integer
    options:
      default: 0
  - id: safety_stock_quantity
    name: Safety Stock Quantity
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: reorder_point_quantity
    name: Reorder Point Quantity
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: standard_lot_size
    name: Standard Lot Size
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
      null: true
      blank: true
  - id: tracking_method
    name: Tracking Method
    type: choice
    options:
      choices:
        - ["none", "None"]
        - ["lot", "Lot"]
        - ["serial", "Serial"]
      default: "none"
  - id: standard_cost
    name: Standard Cost
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: sales_price
    name: Sales Price
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
      null: true
      blank: true
field_layout:
  - title: "Details"
    columns: 2
    items:
      - code
      - name
      - description
      - sales_price


