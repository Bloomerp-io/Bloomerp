name: Product
id: product
description: Product record
name_plural: Products
string_representation: "{code} {name}"
fields:
  - id: code
    name: Code
    type: CharField
    options:
      max_length: 50
      unique: true
  - id: name
    name: Name
    description: Name of the product
    type: CharField
    options:
      max_length: 100
  - id: description
    name: Description
    type: TextField
    options:
      null: true
      blank: true
  - id: type
    name: Type
    type: CharField
    options:
      choices:
        - ["manufactured", "Manufactured"]
        - ["purchased", "Purchased"]
        - ["service", "Service"]
  - id: uom
    name: Unit of Measure
    type: ForeignKey
    options:
      to: manufacturing.master_data.unit_of_measure
      on_delete: PROTECT
  - id: default_warehouse
    name: Default Warehouse
    type: ForeignKey
    options:
      to: manufacturing.master_data.warehouse
      null: true
      blank: true
      on_delete: SET_NULL
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
  - id: lead_time_days
    name: Lead Time (Days)
    type: IntegerField
    options:
      default: 0
  - id: safety_stock_quantity
    name: Safety Stock Quantity
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: reorder_point_quantity
    name: Reorder Point Quantity
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: standard_lot_size
    name: Standard Lot Size
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      null: true
      blank: true
  - id: tracking_method
    name: Tracking Method
    type: CharField
    options:
      choices:
        - ["none", "None"]
        - ["lot", "Lot"]
        - ["serial", "Serial"]
      default: "none"
  - id: standard_cost
    name: Standard Cost
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: sales_price
    name: Sales Price
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      null: true
      blank: true
field_layout:
  sections:
    - title: "Details"
      columns: 2
      items:
        - code
        - name
        - description
        - sales_price
    - title: "Inventory"
      columns: 2
      items:
        - lead_time_days
        - safety_stock_quantity
        - reorder_point_quantity
        - standard_lot_size
        - tracking_method
    - title: "Costing"
      columns: 1
      items:
        - standard_cost


