name: Manufacturing Order
id: manufacturing_order
description: Core production order
name_plural: Manufacturing Orders
string_representation: "{number}"
fields:
  - id: number
    name: Number
    type: CharField
    options:
      max_length: 50
      unique: true
  - id: product
    name: Product
    type: ForeignKey
    options:
      to: manufacturing.master_data.product
      on_delete: PROTECT
  - id: bom
    name: Bill of Material
    type: ForeignKey
    options:
      to: manufacturing.bom_routings.bill_of_material
      null: true
      blank: true
      on_delete: SET_NULL
  - id: routing
    name: Routing
    type: ForeignKey
    options:
      to: manufacturing.bom_routings.routing
      null: true
      blank: true
      on_delete: SET_NULL
  - id: quantity_planned
    name: Quantity Planned
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
  - id: quantity_produced
    name: Quantity Produced
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 2
      default: 0
  - id: uom
    name: Unit of Measure
    type: ForeignKey
    options:
      to: manufacturing.master_data.unit_of_measure
      on_delete: PROTECT
  - id: status
    name: Status
    type: CharField
    options:
      choices:
        - ["draft", "Draft"]
        - ["released", "Released"]
        - ["in_progress", "In Progress"]
        - ["done", "Done"]
        - ["cancelled", "Cancelled"]
      default: "draft"
  - id: priority
    name: Priority
    type: CharField
    options:
      choices:
        - ["low", "Low"]
        - ["normal", "Normal"]
        - ["high", "High"]
      default: "normal"
  - id: planned_start_date
    name: Planned Start Date
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: planned_end_date
    name: Planned End Date
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: actual_start_date
    name: Actual Start Date
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: actual_end_date
    name: Actual End Date
    type: DateTimeField
    options:
      null: true
      blank: true
  - id: warehouse
    name: Warehouse
    type: ForeignKey
    options:
      to: manufacturing.master_data.warehouse
      on_delete: PROTECT
  - id: production_location
    name: Production Location
    type: ForeignKey
    options:
      to: manufacturing.master_data.location
      null: true
      blank: true
      on_delete: SET_NULL
  - id: source_document
    name: Source Document
    type: CharField
    options:
      max_length: 100
      null: true
      blank: true
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
