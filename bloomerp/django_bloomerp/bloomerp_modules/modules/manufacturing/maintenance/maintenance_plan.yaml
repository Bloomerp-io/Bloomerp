name: Maintenance Plan
id: maintenance_plan
description: Planned preventive maintenance
name_plural: Maintenance Plans
string_representation: "{name}"
fields:
  - id: equipment
    name: Equipment
    type: ForeignKey
    options:
      to: manufacturing.maintenance.equipment
      on_delete: CASCADE
  - id: name
    name: Name
    type: CharField
    options:
      max_length: 100
  - id: frequency_type
    name: Frequency Type
    type: CharField
    options:
      choices:
        - ["time_based", "Time Based"]
        - ["meter_based", "Meter Based"]
  - id: frequency_value
    name: Frequency Value
    type: IntegerField
    options:
      default: 0
  - id: last_maintenance_date
    name: Last Maintenance Date
    type: DateField
    options:
      null: true
      blank: true
  - id: next_due_date
    name: Next Due Date
    type: DateField
    options:
      null: true
      blank: true
  - id: is_active
    name: Is Active
    type: BooleanField
    options:
      default: true
