name: Maintenance Work Order
id: maintenance_work_order
description: Work order generated from a request/plan
name_plural: Maintenance Work Orders
string_representation: "{number}"
fields:
  - id: number
    name: Number
    type: string
    options:
      max_length: 50
      unique: true
  - id: maintenance_request
    name: Maintenance Request
    type: foreign_key
    options:
      to: manufacturing.maintenance.maintenance_request
      null: true
      blank: true
      on_delete: SET_NULL
  - id: maintenance_plan
    name: Maintenance Plan
    type: foreign_key
    options:
      to: manufacturing.maintenance.maintenance_plan
      null: true
      blank: true
      on_delete: SET_NULL
  - id: equipment
    name: Equipment
    type: foreign_key
    options:
      to: manufacturing.maintenance.equipment
      on_delete: PROTECT
  - id: planned_start_date
    name: Planned Start Date
    type: datetime
    options:
      null: true
      blank: true
  - id: planned_end_date
    name: Planned End Date
    type: datetime
    options:
      null: true
      blank: true
  - id: actual_start_date
    name: Actual Start Date
    type: datetime
    options:
      null: true
      blank: true
  - id: actual_end_date
    name: Actual End Date
    type: datetime
    options:
      null: true
      blank: true
  - id: status
    name: Status
    type: choice
    options:
      choices:
        - ["draft", "Draft"]
        - ["released", "Released"]
        - ["in_progress", "In Progress"]
        - ["done", "Done"]
        - ["cancelled", "Cancelled"]
      default: "draft"
  - id: notes
    name: Notes
    type: text
    options:
      null: true
      blank: true
