name: Maintenance Request
id: maintenance_request
description: Request for maintenance
name_plural: Maintenance Requests
string_representation: "{number}"
fields:
  - id: number
    name: Number
    type: CharField
    options:
      max_length: 50
      unique: true
  - id: equipment
    name: Equipment
    type: ForeignKey
    options:
      to: manufacturing.maintenance.equipment
      on_delete: PROTECT
  - id: request_date
    name: Request Date
    type: DateTimeField
  - id: requested_by
    name: Requested By
    type: ForeignKey
    options:
      to: hrm.employees.employee
      null: true
      blank: true
      on_delete: SET_NULL
  - id: priority
    name: Priority
    type: CharField
    options:
      choices:
        - ["low", "Low"]
        - ["normal", "Normal"]
        - ["high", "High"]
        - ["critical", "Critical"]
      default: "normal"
  - id: description
    name: Description
    type: TextField
  - id: status
    name: Status
    type: CharField
    options:
      choices:
        - ["open", "Open"]
        - ["in_progress", "In Progress"]
        - ["completed", "Completed"]
        - ["cancelled", "Cancelled"]
      default: "open"
  - id: cause
    name: Cause
    type: TextField
    options:
      null: true
      blank: true
  - id: solution
    name: Solution
    type: TextField
    options:
      null: true
      blank: true
