name: Master Production Schedule
id: master_production_schedule
description: Represents planned production output
name_plural: Master Production Schedules
string_representation: "{product} - {schedule_date}"
fields:
  - id: product
    name: Product
    type: foreign_key
    options:
      to: manufacturing.master_data.product
      on_delete: PROTECT
  - id: schedule_date
    name: Schedule Date
    type: date
  - id: quantity
    name: Quantity
    type: decimal
    options:
      max_digits: 10
      decimal_places: 2
  - id: source
    name: Source
    type: choice
    options:
      choices:
        - ["forecast", "Forecast"]
        - ["sales_orders", "Sales Orders"]
        - ["manual", "Manual"]
  - id: is_firm
    name: Is Firm
    type: boolean
    options:
      default: false
  - id: notes
    name: Notes
    type: text
    options:
      null: true
      blank: true
