name: Quality Inspection Result
id: quality_inspection_result
description: Result per test
name_plural: Quality Inspection Results
string_representation: "{inspection} - {test_name}"
fields:
  - id: inspection
    name: Inspection
    type: ForeignKey
    options:
      to: manufacturing.quality_management.quality_inspection
      on_delete: CASCADE
  - id: test_name
    name: Test Name
    type: CharField
    options:
      max_length: 100
  - id: test_type
    name: Test Type
    type: CharField
    options:
      choices:
        - ["attribute", "Attribute"]
        - ["measurement", "Measurement"]
  - id: value_text
    name: Value Text
    type: CharField
    options:
      max_length: 100
      null: true
      blank: true
  - id: value_numeric
    name: Value Numeric
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 5
      null: true
      blank: true
  - id: result
    name: Result
    type: CharField
    options:
      choices:
        - ["pass", "Pass"]
        - ["fail", "Fail"]
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
