name: Non Conformance Report
id: non_conformance_report
description: Tracks failures / deviations
name_plural: Non Conformance Reports
string_representation: "{number}"
fields:
  - id: number
    name: Number
    type: CharField
    options:
      max_length: 50
      unique: true
  - id: product
    name: Product
    type: ForeignKey
    options:
      to: manufacturing.master_data.product
      null: true
      blank: true
      on_delete: SET_NULL
  - id: lot_number
    name: Lot Number
    type: CharField
    options:
      max_length: 50
      null: true
      blank: true
  - id: source_inspection
    name: Source Inspection
    type: ForeignKey
    options:
      to: manufacturing.quality_management.quality_inspection
      null: true
      blank: true
      on_delete: SET_NULL
  - id: date_reported
    name: Date Reported
    type: DateTimeField
  - id: reported_by
    name: Reported By
    type: ForeignKey
    options:
      to: hrm.employees.employee
      null: true
      blank: true
      on_delete: SET_NULL
  - id: description
    name: Description
    type: TextField
  - id: root_cause
    name: Root Cause
    type: TextField
    options:
      null: true
      blank: true
  - id: corrective_action
    name: Corrective Action
    type: TextField
    options:
      null: true
      blank: true
  - id: status
    name: Status
    type: ChoiceField
    options:
      choices:
        - ["open", "Open"]
        - ["in_analysis", "In Analysis"]
        - ["closed", "Closed"]
      default: "open"
