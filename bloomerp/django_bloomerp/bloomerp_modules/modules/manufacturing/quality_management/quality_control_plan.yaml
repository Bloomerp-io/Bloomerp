name: Quality Control Plan
id: quality_control_plan
description: Defines which checks apply to which product/operation
name_plural: Quality Control Plans
string_representation: "{name}"
fields:
  - id: name
    name: Name
    type: string
    options:
      max_length: 100
  - id: product
    name: Product
    type: foreign_key
    options:
      to: manufacturing.master_data.product
      null: true
      blank: true
      on_delete: SET_NULL
  - id: operation
    name: Operation
    type: foreign_key
    options:
      to: manufacturing.bom_routings.operation
      null: true
      blank: true
      on_delete: SET_NULL
  - id: is_active
    name: Is Active
    type: boolean
    options:
      default: true
