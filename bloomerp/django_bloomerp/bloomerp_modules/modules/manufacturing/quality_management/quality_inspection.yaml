name: Quality Inspection
id: quality_inspection
description: Actual QC performed
name_plural: Quality Inspections
string_representation: "{product} - {inspection_date}"
fields:
  - id: reference_type
    name: Reference Type
    type: CharField
    options:
      choices:
        - ["manufacturing_order", "Manufacturing Order"]
        - ["goods_receipt", "Goods Receipt"]
  - id: reference_id
    name: Reference ID
    type: CharField
    options:
      max_length: 50
  - id: product
    name: Product
    type: ForeignKey
    options:
      to: manufacturing.master_data.product
      on_delete: PROTECT
  - id: lot_number
    name: Lot Number
    type: CharField
    options:
      max_length: 50
      null: true
      blank: true
  - id: inspection_date
    name: Inspection Date
    type: DateTimeField
  - id: inspector
    name: Inspector
    type: ForeignKey
    options:
      to: hrm.employees.employee
      null: true
      blank: true
      on_delete: SET_NULL
  - id: status
    name: Status
    type: CharField
    options:
      choices:
        - ["pending", "Pending"]
        - ["in_progress", "In Progress"]
        - ["passed", "Passed"]
        - ["failed", "Failed"]
      default: "pending"
  - id: notes
    name: Notes
    type: TextField
    options:
      null: true
      blank: true
