name: Quality Control Plan Line
id: quality_control_plan_line
description: Defines individual tests
name_plural: Quality Control Plan Lines
string_representation: "{control_plan} - {test_name}"
fields:
  - id: control_plan
    name: Control Plan
    type: ForeignKey
    options:
      to: manufacturing.quality_management.quality_control_plan
      on_delete: CASCADE
  - id: test_name
    name: Test Name
    type: CharField
    options:
      max_length: 100
  - id: test_type
    name: Test Type
    type: CharField
    options:
      choices:
        - ["attribute", "Attribute"]
        - ["measurement", "Measurement"]
  - id: target_value
    name: Target Value
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 5
      null: true
      blank: true
  - id: tolerance_minus
    name: Tolerance Minus
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 5
      null: true
      blank: true
  - id: tolerance_plus
    name: Tolerance Plus
    type: DecimalField
    options:
      max_digits: 10
      decimal_places: 5
      null: true
      blank: true
  - id: sample_size
    name: Sample Size
    type: IntegerField
    options:
      null: true
      blank: true
  - id: sequence
    name: Sequence
    type: IntegerField
    options:
      default: 0
