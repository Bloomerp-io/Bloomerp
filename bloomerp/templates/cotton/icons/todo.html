<c-icons.base_icon size="{{size}}" class="{{class}}">
    <!-- Modern todo list with thinner lines and rounded corners -->
    <rect x="4" y="5" width="16" height="14" rx="3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Todo items with cleaner styling -->
    <circle cx="7.5" cy="9.5" r="1" fill="currentColor"/>
    <circle cx="7.5" cy="13.5" r="1" fill="currentColor"/>
    <circle cx="7.5" cy="17.5" r="1" fill="currentColor"/>
    
    <!-- Todo text lines with thinner stroke -->
    <line x1="10.5" y1="9.5" x2="17" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10.5" y1="13.5" x2="17" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10.5" y1="17.5" x2="17" y2="17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</c-icons.base_icon>
