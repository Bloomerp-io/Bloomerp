{% load bloomerp %}

<aside 
    id="sidebar" 
    class="fixed left-0 top-14 h-[calc(100vh-2rem)] w-64 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out z-40 overflow-y-auto shadow-r shadow-md"
    x-data="{ isOpen: window.innerWidth >= 1024 }"
    :class="{ '-translate-x-full': !isOpen }"
>
    <!-- Sidebar content -->
    <nav class="px-4 py-6 pb-8">
        <!-- Personal workspaces section -->
        <div class="mb-6" x-data="{ personalOpen: true }">
            <button 
                @click="personalOpen = !personalOpen"
                class="flex items-center justify-between w-full text-left text-sm font-semibold text-secondary hover:text-primary-800 transition-colors mb-3 hover:cursor-pointer"
            >
                <span>Personal workspaces</span>
                <svg 
                    class="w-4 h-4 transition-transform duration-200" 
                    :class="{ 'rotate-180': personalOpen }"
                    fill="currentColor" 
                    viewBox="0 0 20 20"
                >
                    <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                </svg>
            </button>

            <!-- Personal workspaces list -->
            <div 
                x-show="personalOpen"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 transform scale-95"
                x-transition:enter-end="opacity-100 transform scale-100"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 transform scale-100"
                x-transition:leave-end="opacity-0 transform scale-95"
                class="space-y-1"
            >
                {% for workspace in request.user.workspaces %}
                <a 
                    hx-get="{% url 'view_workspace' workspace.pk %}" 
                    hx-target="#main-content" 
                    hx-push-url="true"
                    class="block px-3 py-2 text-sm text-primary-900 font-bold hover:text-primary-800 hover:bg-gray-100 rounded-md transition-colors cursor-hover:cursor-pointer"
                >
                    {{ workspace.name }}
                </a>
                {% endfor %}
            </div>
        </div>
        
        <!-- Model workspaces section -->
        <div class="mb-6" x-data="{ modelOpen: true }">
            <button 
                @click="modelOpen = !modelOpen"
                class="flex items-center justify-between w-full text-left text-sm font-semibold text-gray-700 hover:text-primary-800 transition-colors mb-3 hover:cursor-pointer"
            >
                <span>Model workspaces</span>
                <svg 
                    class="w-4 h-4 transition-transform duration-200" 
                    :class="{ 'rotate-180': modelOpen }"
                    fill="currentColor" 
                    viewBox="0 0 20 20"
                >
                    <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                </svg>
            </button>

            <div 
                x-show="modelOpen"
                x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 transform scale-95"
                x-transition:enter-end="opacity-100 transform scale-100"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 transform scale-100"
                x-transition:leave-end="opacity-0 transform scale-95"
            >
                <!-- Search input -->
                <div class="mb-3">
                    <input 
                        type="text" 
                        placeholder="Search" 
                        aria-label="Search" 
                        oninput="searchContentTypes()"
                        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-colors"
                    >
                </div>

                <!-- Content types -->
                <div class="space-y-1">
                    {% for content_type in request.user.accessible_content_types %}
                    <a 
                        class="content-type-item block px-3 py-2 text-sm text-primary-900 font-bold hover:text-primary-800 hover:bg-secondary rounded-md transition-colors cursor-hover:cursor-pointer" 
                        hx-get="{{ content_type | model_dashboard_url }}"
                        hx-target="#main-content"
                        hx-push-url="true"
                        hx-swap="innerHTML"
                        href="#"
                    >
                        {{ content_type | model_name_plural_from_content_type | title }}
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </nav>
</aside>

<!-- Sidebar overlay for mobile -->
<div 
    id="sidebar-overlay"
    class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"
    x-data="{ isOpen: false }"
    x-show="isOpen"
    @click="isOpen = false; toggleSidebar()"
    style="display: none;"
></div>

<!-- Search Functionality -->
<script>
  // Search functionality
  function searchContentTypes() {
    const input = document.querySelector('#sidebar input[type="text"]');
    const filter = input.value.toUpperCase();
    const items = document.querySelectorAll("#sidebar .content-type-item");

    items.forEach(item => {
      const textValue = item.textContent || item.innerText;
      if (textValue.toUpperCase().indexOf(filter) > -1) {
        item.style.display = "";
      } else {
        item.style.display = "none";
      }
    });
  }  // Sidebar toggle functionality
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const overlay = document.getElementById('sidebar-overlay');
    
    // Get Alpine.js component
    const alpineData = Alpine.$data(sidebar);
    
    // Toggle Alpine.js state
    alpineData.isOpen = !alpineData.isOpen;
    
    // Handle main content positioning
    if (alpineData.isOpen) {
      // Show sidebar
      if (window.innerWidth >= 1024) {
        // Desktop - shift main content
        main.classList.remove('ml-0');
        main.classList.add('ml-64');
      } else {
        // Mobile - show overlay
        if (overlay) {
          overlay.style.display = 'block';
          setTimeout(() => {
            const overlayAlpine = Alpine.$data(overlay);
            overlayAlpine.isOpen = true;
          }, 10);
        }
      }
    } else {
      // Hide sidebar
      if (window.innerWidth >= 1024) {
        // Desktop - shift main content back
        main.classList.remove('ml-64');
        main.classList.add('ml-0');
      } else {
        // Mobile - hide overlay
        if (overlay) {
          const overlayAlpine = Alpine.$data(overlay);
          overlayAlpine.isOpen = false;
          setTimeout(() => overlay.style.display = 'none', 150);
        }
      }
    }
  }

  // Make toggle function globally available
  window.toggleSidebar = toggleSidebar;  // Handle responsive behavior
  window.addEventListener('resize', () => {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const overlay = document.getElementById('sidebar-overlay');
    
    if (window.innerWidth >= 1024) {
      // Desktop - hide overlay and manage main content positioning
      if (overlay) {
        const overlayAlpine = Alpine.$data(overlay);
        overlayAlpine.isOpen = false;
        overlay.style.display = 'none';
      }
      
      // Check if sidebar is visible and adjust main content accordingly
      const alpineData = Alpine.$data(sidebar);
      if (alpineData && alpineData.isOpen) {
        main.classList.remove('ml-0');
        main.classList.add('ml-64');
      } else {
        main.classList.remove('ml-64');
        main.classList.add('ml-0');
      }
    } else {
      // Mobile - always remove left margin
      main.classList.remove('ml-64');
      main.classList.add('ml-0');
    }
  });  // Listen for toggle events from header
  document.addEventListener('DOMContentLoaded', () => {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    
    sidebar.addEventListener('toggle-sidebar', toggleSidebar);
    
    // Wait for Alpine.js to initialize
    setTimeout(() => {
      // Initialize proper state based on screen size
      if (window.innerWidth >= 1024) {
        // Desktop - sidebar visible by default, main content shifted
        const alpineData = Alpine.$data(sidebar);
        if (alpineData) {
          alpineData.isOpen = true;
          main.classList.add('ml-64');
          main.classList.remove('ml-0');
        }
      } else {
        // Mobile - sidebar hidden by default, main content not shifted
        const alpineData = Alpine.$data(sidebar);
        if (alpineData) {
          alpineData.isOpen = false;
          main.classList.add('ml-0');
          main.classList.remove('ml-64');
        }
      }
    }, 100);
  });
</script>

<!-- Add Alpine.js if not already included -->
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
