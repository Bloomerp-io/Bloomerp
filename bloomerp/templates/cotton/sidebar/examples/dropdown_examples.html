<!-- Example usage of sidebar dropdown components -->
{% load cotton %}

<!-- Example 1: Basic dropdown section without search -->
<c-sidebar.dropdown_section 
    title="My Section"
    section_id="mySection"
    show_search=False>
    
    {% slot content_slot %}
        <c-sidebar.item url="/example1">Item 1</c-sidebar.item>
        <c-sidebar.item url="/example2">Item 2</c-sidebar.item>
        <c-sidebar.item url="/example3">Item 3</c-sidebar.item>
    {% endslot %}
</c-sidebar.dropdown_section>

<!-- Example 2: Dropdown section with search -->
<c-sidebar.dropdown_section 
    title="Searchable Section"
    section_id="searchable"
    show_search=True
    search_placeholder="Search items..."
    search_function="myCustomSearchFunction()">
    
    {% slot content_slot %}
        <div class="searchable-item">
            <c-sidebar.item url="/item1">Searchable Item 1</c-sidebar.item>
        </div>
        <div class="searchable-item">
            <c-sidebar.item url="/item2">Searchable Item 2</c-sidebar.item>
        </div>
    {% endslot %}
</c-sidebar.dropdown_section>

<!-- Example 3: Using dropdown list container directly -->
<c-sidebar.dropdown_list_container>
    {% slot items_slot %}
        <c-sidebar.item url="/direct1">Direct Item 1</c-sidebar.item>
        <c-sidebar.item url="/direct2">Direct Item 2</c-sidebar.item>
    {% endslot %}
</c-sidebar.dropdown_list_container>
