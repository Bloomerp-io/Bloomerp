{% load static %}
{% load crispy_forms_tags %}
{% load bloomerp %}

{% breadcrumb model=model title=title %}

{% if form.errors %}
<div class="alert alert-danger" role="alert">
	{{form.errors}}
</div>
{% endif %}

<form method="post" action="" enctype="multipart/form-data">
	{% csrf_token %}
	
	{% if form.helper %}{% crispy form %}{% else %}{{form|crispy}}{% endif %}

	<div class="flex justify-center gap-2 mt-2">
		<button type="submit" class="btn btn-primary">Create {{ model_name }}</button>
		<button type="reset" class="btn btn-secondary" href="#">Reset</button>
	</div>

</form>
<!--End Form card-->
