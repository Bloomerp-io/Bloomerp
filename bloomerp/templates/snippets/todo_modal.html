{% load static %}
{% load cotton %}

<c-ui.modal id="todoModal" title="Todo's" size="lg" show_footer=True>
    <div class="container" id="todo-container">
        
    </div>
    
    {% slot footer_slot %}
        <button onclick="closeModal('todoModal')" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors">
            Close
        </button>
    {% endslot %}
</c-ui.modal>
