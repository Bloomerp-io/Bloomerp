<!---
Description: This snippet is used to render the filter section of the list view. It includes the search bar, filter button, settings button, and save filter button.

Variables:
    - content_type_id: The id of the content type of the model being displayed.
    - application_fields: A list of fields of the model being displayed.
    - target: The id of the element that will be updated with the new content when the filter is applied.
    - include_actions: A boolean that indicates if the actions column should be included in the table.
    - initial_query: Initial query
    -->
{% load static %}
{% load bloomerp %}
{% load cotton %}

<div class="flex justify-between items-center mb-2">
    <div class="flex gap-2">
        <!-- Search -->
        <div class="flex">
            <input 
                type="text" 
                class="input" 
                placeholder="Search" 
                autocomplete="off"
                name="data_table_string_search"
                hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions={{ include_actions }}{% if initial_query %}&{{initial_query}}{% endif %}"
                hx-target="#{{ datatable_id }}"
                hx-swap="innerHTML"
                hx-include="#filterForm{{ datatable_id }}"
                hx-trigger="keyup delay:500ms"
                >
        </div>        <!-- End search -->
    </div>

    <div class="flex gap-1">
        <!-- Toggle view dropdown -->
        <c-ui.dropdown.body :icon="False" trigger_icon="<img src='{% static 'bloomerp/icons/eye.svg' %}' class='w-5 h-5' />">
            <div class="py-1" role="none">
                <button 
                    type="button"
                    class="flex items-center px-4 py-2 text-sm w-full text-left transition-colors duration-150 text-gray-700 hover:bg-gray-100 hover:text-primary-800 cursor-hover:cursor-pointer"
                    @click="openModal('calendarViewModal{{datatable_id}}')"
                    role="menuitem">
                    Calendar view
                </button>
            </div>
        </c-ui.dropdown.body>
        <!-- End toggle view dropdown -->

        <!-- Filter dropdown -->
        <c-ui.dropdown.body :icon="False" trigger_icon="<img src='{% static 'bloomerp/icons/filter.svg' %}' class='w-5 h-5' />" menu_class="min-w-96 p-4">
            <div id="filterForm{{ datatable_id }}">
                <div class="p-4">
                    <div 
                        id="filterForm{{ datatable_id }}"
                        >
                        <div
                            class="grid grid-cols-1 gap-4 justify-center items-center"
                            id="filterInputContainer{{ datatable_id }}"
                            hx-get="{% url 'components_list_view_filter_inputs' %}?step=row&content_type_id={{ content_type_id }}"
                            hx-target="#filterInputContainer{{ datatable_id }}"
                            hx-swap="innerHTML"
                            hx-trigger="load"
                        >
                            
                        </div>

                        <hr class="my-4 border-gray-200">

                        <!-- Apply filters section -->
                        <div class="flex justify-between items-center">

                            <a 
                                href="#" 
                                class="flex items-center gap-2 text-gray-600 hover:text-primary-600 transition-colors duration-200"
                                hx-get="{% url 'components_list_view_filter_inputs' %}?step=row&content_type_id={{ content_type_id }}"
                                hx-target="#filterForm{{ datatable_id }} .new-filter-input-row"
                                hx-swap="outerHTML"
                                >
                                <img src="{% static 'bloomerp/icons/add.svg' %}" height="16" alt="Add filter" class="w-4 h-4"/>
                                <span class="text-sm">Add new filter</span>
                            </a>

                            <div class="flex gap-2">
                                <button 
                                    class="px-3 py-1.5 bg-primary-600 text-white text-sm rounded-md hover:bg-primary-700 transition-colors duration-200"
                                    hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions={{ include_actions }}"
                                    hx-target="#{{ datatable_id }}"
                                    hx-include="#filterForm{{ datatable_id }}"
                                    hx-swap="innerHTML"
                                    >
                                        Apply filter
                                </button>
                                <button 
                                    class="px-3 py-1.5 bg-gray-500 text-white text-sm rounded-md hover:bg-gray-600 transition-colors duration-200" 
                                    type="button"
                                    hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions={{ include_actions }}"
                                    hx-target="#{{ datatable_id }}"
                                    hx-swap="innerHTML"
                                    hx-trigger="click"
                                        >Remove filters
                                </button>
                            </div>
                        </div>
                        <!-- End apply filters section -->
                    </div>
                </div>
            </div>
        </c-ui.dropdown.body>
        <!-- End filter dropdown -->

        <!-- End Settings -->
        <c-ui.dropdown.body :icon="False" trigger_icon="<i class='bi bi-three-dots'></i>">
            
            <div class="py-1" role="none">
                <a 
                    href="{% url 'users_my_profile_list_view_preference' %}?content_type_id={{ content_type_id }}&return_to={{ request.path }}"
                    class="flex items-center px-4 py-2 text-sm w-full text-left transition-colors duration-150 text-gray-700 hover:bg-gray-100 hover:text-primary-800 cursor-hover:cursor-pointer"
                    role="menuitem">
                    Select fields
                </a>
                <button 
                    type="button"
                    class="flex items-center px-4 py-2 text-sm w-full text-left transition-colors duration-150 text-gray-700 hover:bg-gray-100 hover:text-primary-800 cursor-hover:cursor-pointer"
                    hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions=true&data_table_download=csv"
                    hx-include="#filterForm{{ datatable_id }}"
                    hx-swap="none"
                    hx-ext="htmx-download"
                    role="menuitem">
                    Download csv
                </button>
                <button 
                    type="button"
                    class="flex items-center px-4 py-2 text-sm w-full text-left transition-colors duration-150 text-gray-700 hover:bg-gray-100 hover:text-primary-800 cursor-hover:cursor-pointer"
                    hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions=true&data_table_download=xlsx"
                    hx-include="#filterForm{{ datatable_id }}"
                    hx-swap="none"
                    hx-ext="htmx-download"
                    role="menuitem">
                    Download xlsx
                </button>
            </div>
        </c-ui.dropdown.body>
        <!-- End Settings -->
    </div>
</div>


<!-- Calendar View Modal -->
<c-ui.modal 
    id="calendarViewModal{{datatable_id}}"
    title="Calendar view"
    size="sm"
    show_footer="true">
    
    <div class="space-y-4" id="calendarViewInputs{{datatable_id}}">
        <div>
            <label for="start_date" class="block text-sm font-medium text-gray-700 mb-2">Start Date Field</label>
            <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 focus:border-primary-500" name="data_table_calendar_view_fields">
                {% for field in application_fields %}
                    {% if field.field_type == 'DateField' or field.field_type == 'DateTimeField' %}
                        <option value="{{ field.field }}">{{ field.field }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="end_date" class="block text-sm font-medium text-gray-700 mb-2">End Date Field (Optional)</label>
            <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 focus:border-primary-500" name="data_table_calendar_view_fields">
                {% for field in application_fields %}
                    {% if field.field_type == 'DateField' or field.field_type == 'DateTimeField' %}
                        <option value="{{ field.field }}">{{ field.field }}</option>
                    {% endif %}
                {% endfor %}
            </select>
            <p class="text-sm text-gray-500 mt-1">Specify the end date if you want see calendar date ranges.</p>
        </div>
    </div>
    
    <div slot="footer_slot" class="flex justify-end gap-3">
        <button
            type="button"
            class="px-4 py-2 text-sm text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors duration-200"
            onclick="closeModal('calendarViewModal{{datatable_id}}')"
        >
            Close
        </button>
        <button
            hx-get="{% url 'components_datatable' %}?data_table_content_type_id={{ content_type_id }}&data_table_include_actions={{ include_actions }}{% if initial_query %}&{{initial_query}}{% endif %}&data_table_view_type=calendar"
            hx-include="#calendarViewInputs{{datatable_id}}"
            hx-trigger="click"
            hx-target="#{{datatable_id}}"
            hx-swap="innerHTML"
            class="px-4 py-2 text-sm text-white bg-primary-600 rounded-md hover:bg-primary-700 transition-colors duration-200"
            onclick="closeModal('calendarViewModal{{datatable_id}}')"
            >Calendar view
        </button>
    </div>
</c-ui.modal>

<script>
    function removeFilterInputRow(element) {
        const filterInputRow = element.closest('.filter-input-row');
        filterInputRow.remove();
    }
</script>
